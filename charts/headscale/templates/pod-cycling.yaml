apiVersion: batch/v1
kind: CronJob
metadata:
  name: recycle-pods-cronjob
  namespace: {{ .Values.namespaceOverride }}
spec:
  schedule: "*/5 * * * *" # every 5min
  concurrencyPolicy: Forbid # Prevents overlapping jobs if a previous run hangs
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: pod-cycler-sa
          restartPolicy: OnFailure   # Prevents the Pod from restarting on container failure
          containers:
          - name: kubectl
            image: bitnami/kubectl:latest
            command: ["/bin/sh", "-c"]
            args: ["kubectl rollout restart deploy"]
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pod-cycler-sa
  namespace: {{ .Values.namespaceOverride }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pod-cycler-role
  namespace: {{ .Values.namespaceOverride }}
rules:
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "patch", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pod-cycler-sa-binding
  namespace: {{ .Values.namespaceOverride }}
subjects:
- kind: ServiceAccount
  name: pod-cycler-sa
  namespace: {{ .Values.namespaceOverride }}
roleRef:
  kind: Role
  name: pod-cycler-role
  apiGroup: rbac.authorization.k8s.io

